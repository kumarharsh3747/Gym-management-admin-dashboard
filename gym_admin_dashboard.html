<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GymOS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#20243a;--border:#2a2e4a;
  --accent:#6c63ff;--accent2:#00d4aa;--accent3:#ff6b6b;--accent4:#ffa94d;
  --text:#e8eaf6;--muted:#8b90b0;--dim:#3a3f5c;
  --green:#00d4aa;--red:#ff6b6b;--yellow:#ffa94d;--blue:#4fc3f7;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo .icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sidebar-logo h1{font-size:16px;font-weight:700;color:var(--text)}
.sidebar-logo span{font-size:11px;color:var(--muted);display:block;font-weight:400;font-family:'DM Sans',sans-serif}
.nav-section{padding:12px 0}
.nav-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:0 16px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--muted);transition:all .15s;font-size:13.5px;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(108,99,255,.12);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-item .ni{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent3);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
/* TOPBAR */
.topbar{position:fixed;top:0;left:220px;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:99}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);flex:1}
.topbar-gym{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer}
.topbar-gym span{font-size:13px;color:var(--text);font-weight:500}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
/* MAIN */
.main{margin-left:220px;margin-top:56px;flex:1;padding:24px;min-height:calc(100vh - 56px)}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* STAT CARDS */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--accent))}
.stat-card:hover{border-color:var(--c,var(--accent));transform:translateY(-2px)}
.stat-card.selected{border-color:var(--c,var(--accent));background:rgba(108,99,255,.07)}
.stat-card.selected.green{background:rgba(0,212,170,.07)}
.stat-card.selected.red{background:rgba(255,107,107,.07)}
.stat-card.selected.yellow{background:rgba(255,169,77,.07)}
.stat-icon{width:38px;height:38px;border-radius:9px;background:rgba(108,99,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.stat-val{font-size:28px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--text)}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.stat-delta{font-size:11px;margin-top:8px;color:var(--green)}
/* MEMBER CARDS */
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-top:16px}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;position:relative}
.member-card:hover{border-color:var(--dim);transform:translateY(-1px)}
.member-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.member-photo{width:50px;height:50px;border-radius:50%;object-fit:cover;background:var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);border:2px solid var(--border)}
.member-info h3{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.member-id{font-size:11px;color:var(--accent);font-family:monospace;margin-top:2px}
.member-phone{font-size:12px;color:var(--muted);margin-top:4px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;gap:4px;flex-shrink:0}
.badge-active{background:rgba(0,212,170,.15);color:var(--green)}
.badge-expired{background:rgba(255,107,107,.15);color:var(--red)}
.badge-soon{background:rgba(255,169,77,.15);color:var(--yellow)}
.badge-pending{background:rgba(75,120,255,.15);color:var(--blue)}
.member-pkg{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:10px}
.member-pkg strong{color:var(--text)}
.progress-wrap{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.progress-bar{background:var(--dim);border-radius:4px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
.member-dates{font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;gap:6px;align-items:center}
.member-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{border:none;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{background:var(--dim);color:var(--text);border-color:var(--dim)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7c74ff}
.btn-danger{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.2)}
.btn-danger:hover{background:rgba(255,107,107,.2)}
.btn-success{background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.2)}
.btn-success:hover{background:rgba(0,212,170,.2)}
.btn-lg{padding:10px 20px;font-size:14px;border-radius:9px}
/* SEARCH & FILTERS */
.filters-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
select{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-lg{max-width:700px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-header h2{font-size:18px;color:var(--text)}
.modal-close{background:var(--dim);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:var(--border);color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.toggle-group{display:flex;gap:10px;margin-bottom:20px}
.toggle-option{flex:1;padding:10px;border:1px solid var(--border);border-radius:9px;text-align:center;cursor:pointer;transition:.15s;font-size:13px;color:var(--muted)}
.toggle-option.active{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.1);font-weight:500}
/* TABS */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:var(--text)}
/* CHART CONTAINERS */
.chart-wrap{position:relative;height:200px}
/* SECTION */
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
/* RECENT TABLE */
.rtable{width:100%;border-collapse:collapse}
.rtable th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;font-weight:500}
.rtable td{padding:10px 12px;border-bottom:1px solid rgba(42,46,74,.5);font-size:13px;vertical-align:middle}
.rtable tr:hover td{background:rgba(255,255,255,.02)}
/* QR */
.qr-box{background:var(--dim);border-radius:12px;width:160px;height:160px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);flex-direction:column;gap:8px}
/* PENDING CARD */
.pending-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.pending-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.pending-field{font-size:12px}
.pending-field span{color:var(--muted);display:block;margin-bottom:2px}
.pending-field strong{color:var(--text);font-size:13px}
/* PACKAGE CARD */
.pkg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;cursor:pointer;transition:.2s}
.pkg-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.pkg-price{font-size:30px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--accent)}
.pkg-per{font-size:12px;color:var(--muted)}
.pkg-feature{font-size:12px;color:var(--muted);padding:4px 0;display:flex;gap:6px;align-items:center}
.pkg-feature::before{content:'✓';color:var(--green)}
/* TRAINER */
.trainer-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.trainer-avatar{width:64px;height:64px;border-radius:50%;background:var(--dim);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--accent2);border:2px solid var(--border)}
/* PAYMENT */
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(42,46,74,.5)}
.pay-row:last-child{border-bottom:none}
/* ANNOUNCEMENT */
.ann-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:12px}
.ann-meta{font-size:11px;color:var(--muted);margin-top:8px}
/* SETTINGS */
.settings-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(42,46,74,.3)}
.settings-row:last-child{border-bottom:none}
.toggle-sw{width:40px;height:22px;background:var(--dim);border-radius:20px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--accent)}
.toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.toggle-sw.on::after{left:21px}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.pager{display:flex;gap:8px;justify-content:center;margin-top:20px;align-items:center}
.pager-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:13px;transition:.15s}
.pager-btn:hover,.pager-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip{background:var(--dim);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--muted)}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
</style>
</head>

// ===== HELPERS =====
function daysLeft(endDate){
  const now = new Date();
  const end = new Date(endDate);
  return Math.ceil((end - now) / (1000*60*60*24));
}
function getStatus(m){
  const d = daysLeft(m.endDate);
  if(d < 0) return 'expired';
  if(d <= 7) return 'expiring';
  return 'active';
}
function progressPct(m){
  const start = new Date(m.startDate);
  const end = new Date(m.endDate);
  const now = new Date();
  const total = end - start;
  const elapsed = now - start;
  return Math.min(100, Math.max(0, Math.round((elapsed/total)*100)));
}
function initials(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function getStatusBadge(status){
  if(status==='active') return '<span class="badge badge-active">● Active</span>';
  if(status==='expired') return '<span class="badge badge-expired">● Expired</span>';
  if(status==='expiring') return '<span class="badge badge-soon">● Expiring Soon</span>';
  if(status==='pending') return '<span class="badge badge-pending">● Pending</span>';
  return '';
}
function pkgDuration(pkg){
  const p = packages.find(x=>x.name===pkg);
  return p ? p.duration : 1;
}
function calcEndDate(start, pkg){
  if(!start || !pkg) return '';
  const d = new Date(start);
  d.setMonth(d.getMonth() + pkgDuration(pkg));
  return d.toISOString().split('T')[0];
}

function pendingHTML(){
  const plist = [...pendingRegistrations];
  return `
  <div class="page-header">

  ${plist.map(p=>`<div class="pending-card">
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:46px;height:46px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--blue)">${initials(p.name)}</div>

          <div style="font-weight:600;font-size:15px">${p.name}</div>
          <div style="font-size:12px;color:var(--muted)">📞 ${p.phone} · Submitted ${fmtDate(p.submitted)}</div>
        </div>
      </div>
      ${getStatusBadge('pending')}
    </div>
    <div class="pending-info">
      <div class="pending-field"><span>Address</span><strong>${p.address}</strong></div>
      <div class="pending-field"><span>Age</span><strong>${p.age} yrs</strong></div>
      <div class="pending-field"><span>Height / Weight</span><strong>${p.height} cm / ${p.weight} kg</strong></div>
      <div class="pending-field"><span>Package</span><strong>${p.package}</strong></div>
      <div class="pending-field"><span>Personal Training</span><strong>${p.trainer?'Yes':'No'}</strong></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-success btn-lg" onclick="approvePending('${p.id}')">✅ Approve</button>
      <button class="btn btn-danger btn-lg" onclick="rejectPending('${p.id}')">❌ Reject</button>
    </div>
  </div>`).join('')}`;
}
function approvePending(id){
  const idx=pendingRegistrations.findIndex(x=>x.id===id);
  if(idx<0) return;
  const p=pendingRegistrations[idx];
  const start=new Date().toISOString().split('T')[0];
  const end=calcEndDate(start,p.package);
  members.push({id:'MBR0'+String(members.length+1).padStart(2,'0'),name:p.name,phone:p.phone,address:p.address,age:p.age,height:p.height,weight:p.weight,photo:'',package:p.package,startDate:start,endDate:end,type:p.trainer?'Personal Training':'General',trainer:p.trainer,status:'active'});
  pendingRegistrations.splice(idx,1);
  document.getElementById('pending-count').textContent=pendingRegistrations.length||'';
  renderPage();
}
function rejectPending(id){
  if(confirm('Reject this registration?')){
    const idx=pendingRegistrations.findIndex(x=>x.id===id);
    if(idx>-1){ pendingRegistrations.splice(idx,1); document.getElementById('pending-count').textContent=pendingRegistrations.length||''; renderPage(); }
  }
}
